name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  meta:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - id: meta
        name: Compute tag/version
        run: |
          version="$(node -p "require('./wails.json').info.productVersion")"
          tag="v${version}-${GITHUB_RUN_NUMBER}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: RequestProbe ${{ steps.meta.outputs.tag }}
          generate_release_notes: true

  build:
    name: Build (${{ matrix.os }})
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            webkit_pkg="libwebkit2gtk-4.1-dev"
          else
            webkit_pkg="libwebkit2gtk-4.0-dev"
          fi
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            "$webkit_pkg" \
            libayatana-appindicator3-dev

      - name: Sync resource monitor Python env (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          UV_PROJECT_ENVIRONMENT=.venv-monitor uv sync --python 3.13 --no-dev

      - name: Sync resource monitor Python env (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:UV_PROJECT_ENVIRONMENT = ".venv-monitor"
          uv sync --python 3.13 --no-dev

      - name: Install Wails CLI
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Prepare installer runtime staging (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $runtimeDir = "build/windows/installer/runtime/python"
          if (Test-Path $runtimeDir) {
            Remove-Item $runtimeDir -Recurse -Force
          }
          .\.venv-monitor\Scripts\python.exe scripts\prepare_python_runtime.py --dest $runtimeDir

      - name: Build app (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          wails build -clean

      - name: Build app (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          wails build -clean -nsis

      - name: Build app (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          wails build -clean

      - name: Bundle Python runtime (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find build/bin -maxdepth 1 -type d -name '*.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "No macOS app bundle produced under build/bin" >&2
            exit 1
          fi
          .venv-monitor/bin/python scripts/prepare_python_runtime.py --dest "$app_path/Contents/Resources/python"

      - name: Bundle Python runtime (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          .venv-monitor/bin/python scripts/prepare_python_runtime.py --dest build/bin/python

      - name: Copy Python runtime beside Windows portable build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stagedRuntime = "build/windows/installer/runtime/python"
          $portableRuntime = "build/bin/python"
          if (-not (Test-Path $stagedRuntime)) {
            throw "Missing staged Windows runtime at $stagedRuntime"
          }
          if (Test-Path $portableRuntime) {
            Remove-Item $portableRuntime -Recurse -Force
          }
          Copy-Item $stagedRuntime $portableRuntime -Recurse

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          asset_path="$(find build/bin -maxdepth 1 -type f -name '*-macos-*.zip' -print -quit)"
          if [ -z "$asset_path" ]; then
            echo "No macOS zip produced under build/bin" >&2
            exit 1
          fi
          cp "$asset_path" "dist/RequestProbe-${{ needs.meta.outputs.tag }}-macOS.zip"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $portableAsset = "RequestProbe-${{ needs.meta.outputs.tag }}-Windows-portable.zip"
          $installer = Get-ChildItem -Path build/bin -Filter "*installer.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows installer generated under build/bin"
          }
          Copy-Item $installer.FullName "dist/RequestProbe-${{ needs.meta.outputs.tag }}-Windows-installer.exe"
          $portableEntries = Get-ChildItem -Path build/bin | Where-Object { $_.Name -notlike "*installer.exe" }
          if (-not $portableEntries) {
            throw "No portable Windows build outputs generated under build/bin"
          }
          Compress-Archive -Path ($portableEntries | ForEach-Object FullName) -DestinationPath "dist/$portableAsset" -Force

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          asset="RequestProbe-${{ needs.meta.outputs.tag }}-Linux.tar.gz"
          tar -C build/bin -czf "dist/$asset" .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          files: dist/*
